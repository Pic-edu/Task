<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساحة عملي المتقدمة | Advanced Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-on-dark: #f8fafc;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-base: #0b0f19;
            --bg-surface: #131c2e;
            --bg-sidebar: #070a12;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Readex Pro', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            transition: var(--transition);
        }

        /* --- Auth Screen --- */
        #auth-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            border-radius: var(--radius-lg);
            color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-md);
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            margin-top: 12px;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-toggle-text {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-top: 20px;
            cursor: pointer;
        }

        .auth-toggle-text span {
            color: var(--primary);
            font-weight: 500;
        }

        /* --- App Layout --- */
        #app-layout {
            display: none;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar Component */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            color: var(--text-on-dark);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            border-left: 1px solid var(--border-color);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: #94a3b8;
            transition: var(--transition);
            text-decoration: none;
        }

        .menu-item:hover, .menu-item.active {
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .menu-item.admin-only {
            border-right: 3px solid var(--accent);
            display: none; /* Controlled by user role checks */
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .user-meta h4 {
            font-size: 13px;
            font-weight: 500;
        }

        .user-meta p {
            font-size: 11px;
            color: #94a3b8;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .logout-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Content Container */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header Component */
        .top-header {
            height: 70px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            transition: var(--transition);
        }

        .search-wrapper {
            position: relative;
            width: 380px;
        }

        .search-wrapper i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 10px 42px 10px 16px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-base);
            border-radius: var(--radius-md);
            outline: none;
            font-size: 13px;
            color: var(--text-main);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            background-color: var(--bg-surface);
        }

        /* Content Views Area */
        .view-section {
            display: none;
            flex-grow: 1;
            padding: 32px;
            overflow-y: auto;
            height: calc(100vh - 70px);
        }

        .view-section.active {
            display: block;
        }

        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .view-title h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        .view-title p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- View: Kanban Dashboard --- */
        .kanban-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            align-items: start;
        }

        .kanban-column {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            min-height: 500px;
            transition: var(--transition);
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg-base);
        }

        .column-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .column-title {
            font-size: 15px;
            font-weight: 700;
        }

        .column-badge {
            background-color: var(--bg-base);
            color: var(--text-muted);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 450px;
        }

        .task-card {
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: grab;
            transition: var(--transition);
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .task-priority {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .priority-high { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .priority-medium { background-color: rgba(245, 158, 11, 0.1); color: var(--warning); }
